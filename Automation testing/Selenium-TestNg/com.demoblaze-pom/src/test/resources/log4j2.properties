name = PropertiesConfig

appenders = console, logfile

# Console Appender
appender.console.type = Console
appender.console.name = console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss SSS} [%t] %c{1} - %msg%n

# File Appender
appender.logfile.type = File
appender.logfile.name = logfile
appender.logfile.fileName = test-output/logs/testng.log
appender.logfile.layout.type = PatternLayout
appender.logfile.layout.pattern = [%-5level] %d{yyyy-MM-dd HH:mm:ss SSS} [%t] %c{1} - %msg%n

# Root Logger
rootLogger.level = info
rootLogger.appenderRefs = console, logfile

rootLogger.appenderRef.console.ref = console
rootLogger.appenderRef.logfile.ref = logfile